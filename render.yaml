services:
  - type: web
    name: moving-watermark-bot
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: standard          # standard = 2GB RAM, enough for 1GB video processing
    healthCheckPath: /health
    envVars:
      - key: BOT_TOKEN
        sync: false
      - key: API_ID
        sync: false
      - key: API_HASH
        sync: false
      - key: ADMINS
        sync: false
      - key: DATABASE_PATH
        value: /tmp/watermark_bot.db
      - key: TEMP_DIR
        value: /tmp/wm_temp
      - key: LOGS_DIR
        value: /tmp/wm_logs
      - key: MAX_FILE_SIZE_GB
        value: "1"
      - key: DEFAULT_OPACITY
        value: "0.7"
      - key: DEFAULT_SPEED
        value: "80"
      - key: DEFAULT_SIZE
        value: "0.2"
      - key: DEFAULT_WATERMARK_TEXT
        value: "@YourChannel"
      - key: PORT
        value: "10000"
